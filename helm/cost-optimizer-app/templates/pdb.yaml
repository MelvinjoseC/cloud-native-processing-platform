{{- if .Values.resilience.pdb.enabled -}}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: producer-pdb
  namespace: {{ .Values.global.namespace | default .Release.Namespace }}
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: producer
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: rabbitmq-pdb
  namespace: {{ .Values.global.namespace | default .Release.Namespace }}
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: rabbitmq
{{- end }}
